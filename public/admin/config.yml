backend:
  name: github
  repo: KillerGanja/SvenVollbrecht.de
  branch: main
  base_url: https://svenvollbrecht.de
  auth_endpoint: oauth/auth.php

media_folder: "public/uploads"
public_folder: "/uploads"


collections:

  # ARBEITEN (Works)
  - name: "works"
    label: "Arbeiten"
    folder: "src/content/works"
    extension: "md"
    format: "yaml-frontmatter"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} ({{year}})"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Reihenfolge", name: "order", widget: "number", required: false, default: 9999 }
      - { label: "Jahr", name: "year", widget: "number", required: false }
      - { label: "Serie", name: "series", widget: "string", required: false }
      - { label: "Material (DE)", name: "materials_de", widget: "string" }
      - { label: "Material (EN)", name: "materials_en", widget: "string", required: false }
      - { label: "Maße (DE)", name: "dimensions_de", widget: "string" }
      - { label: "Maße (EN)", name: "dimensions_en", widget: "string", required: false }
      - { label: "Beschreibung (DE)", name: "description_de", widget: "markdown" }
      - { label: "Beschreibung (EN)", name: "description_en", widget: "markdown", required: false }
      - { label: "Cover Bild", name: "cover_image", widget: "image", required: true }
      - label: "Galerie Bilder"
        name: "gallery_images"
        widget: "list"
        required: false
        summary: "{{fields.image}}"
        field: { label: "Bild / Video", name: "image", widget: "file" }

  # AUSSTELLUNGEN (Exhibitions)
  - name: "exhibitions"
    label: "Ausstellungen"
    folder: "src/content/exhibitions"
    extension: "md"
    format: "yaml-frontmatter"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} ({{year}} — {{city_de}})"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Reihenfolge", name: "order", widget: "number", required: false, default: 9999 }
      - { label: "Jahr", name: "year", widget: "number", required: false }
      - { label: "Veranstaltungsort (DE)", name: "venue_de", widget: "string" }
      - { label: "Veranstaltungsort (EN)", name: "venue_en", widget: "string", required: false }
      - { label: "Stadt (DE)", name: "city_de", widget: "string", required: false }
      - { label: "Stadt (EN)", name: "city_en", widget: "string", required: false }
      - { label: "Zeitraum (DE)", name: "period_de", widget: "string", required: false }
      - { label: "Zeitraum (EN)", name: "period_en", widget: "string", required: false }
      - { label: "Beschreibung (DE)", name: "description_de", widget: "markdown", required: false }
      - { label: "Beschreibung (EN)", name: "description_en", widget: "markdown", required: false }
      - { label: "Cover Bild", name: "cover_image", widget: "image", required: true }

  # PRESSE (Press)
  - name: "press"
    label: "Presse"
    folder: "src/content/press"
    extension: "md"
    format: "yaml-frontmatter"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "TITEL", name: "title", widget: "string" }
      - { label: "SLUG", name: "slug", widget: "string" }
      - { label: "MEDIUM (OPTIONAL)", name: "medium", widget: "string", required: false }
      - { label: "DATUM (OPTIONAL)", name: "date", widget: "datetime", format: "YYYY-MM-DD", dateFormat: "DD.MM.YYYY", timeFormat: false, required: false }
      - { label: "LINK / DATEI (OPTIONAL)", name: "url", widget: "string", required: false }
      - { label: "TEXT (DE)", name: "text_de", widget: "markdown", required: false }
      - { label: "TEXT (EN)", name: "text_en", widget: "markdown", required: false }

  # SEITEN (Static Pages)
  - name: "pages"
    label: "Seiten"
    files:
      - label: "Startseite"
        name: "home"
        file: "src/content/pages/home.md"
        format: "yaml-frontmatter"
        fields:
          - { label: "Titel (Variablen-Key)", name: "title", widget: "hidden", default: "home" }
          - { label: "Haupt-Medium (Bild oder Video)", name: "image", widget: "file", required: false }
          - { label: "Text (DE)", name: "body_de", widget: "markdown", required: false }
          - { label: "Text (EN)", name: "body_en", widget: "markdown", required: false }
          - { label: "Slug", name: "slug", widget: "hidden", default: "home" }
      - label: "Über mich"
        name: "about"
        file: "src/content/pages/about.md"
        format: "yaml-frontmatter"
        fields:
          - { label: "Titel", name: "title", widget: "string", default: "Über mich" }
          - { label: "Inhalt (DE)", name: "body_de", widget: "markdown" }
          - { label: "Inhalt (EN)", name: "body_en", widget: "markdown", required: false }
          - { label: "Portfolio PDF (DE)", name: "portfolio_de", widget: "file", required: false }
          - { label: "Portfolio PDF (EN)", name: "portfolio_en", widget: "file", required: false }
          - { label: "Slug", name: "slug", widget: "hidden", default: "about" }
      - label: "Kontakt"
        name: "contact"
        file: "src/content/pages/contact.md"
        format: "yaml-frontmatter"
        fields:
          - { label: "Titel", name: "title", widget: "string", default: "Kontakt" }
          - { label: "Inhalt (DE)", name: "body_de", widget: "markdown" }
          - { label: "Inhalt (EN)", name: "body_en", widget: "markdown", required: false }
          - { label: "Slug", name: "slug", widget: "hidden", default: "contact" }
      - label: "Impressum"
        name: "impressum"
        file: "src/content/pages/impressum.md"
        format: "yaml-frontmatter"
        fields:
          - { label: "Titel", name: "title", widget: "string", default: "Impressum" }
          - { label: "Inhalt (DE)", name: "body_de", widget: "markdown" }
          - { label: "Inhalt (EN)", name: "body_en", widget: "markdown", required: false }
          - { label: "Slug", name: "slug", widget: "hidden", default: "impressum" }
      - label: "Datenschutz"
        name: "privacy"
        file: "src/content/pages/privacy.md"
        format: "yaml-frontmatter"
        fields:
          - { label: "Titel", name: "title", widget: "string", default: "Datenschutz" }
          - { label: "Inhalt (DE)", name: "body_de", widget: "markdown" }
          - { label: "Inhalt (EN)", name: "body_en", widget: "markdown", required: false }
          - { label: "Slug", name: "slug", widget: "hidden", default: "privacy" }

  # GLOBALE EINSTELLUNGEN
  - name: "settings"
    label: "Globale Einstellungen"
    files:
      - label: "Typografie & Abstände"
        name: "general"
        file: "src/content/ui/settings.json"
        fields:
          - { label: "Zeilenabstand", name: "prose_line_height", widget: "string", default: "1.0", hint: "Nutzen Sie Zahlen ohne Einheit, z.B. 1.0 (eng), 1.3 (normal), 1.6 (weit)." }
          - { label: "Abstand zwischen Absätzen", name: "prose_paragraph_spacing", widget: "string", default: "0.5rem", hint: "Nutzen Sie Werte wie 0.5rem, 1rem oder 15px für den Abstand zwischen Textblöcken." }
          - { label: "Schriftgröße", name: "prose_font_size", widget: "string", default: "18px", hint: "Nutzen Sie Werte wie 16px, 18px, 20px oder 1.1rem." }
          - { label: "Schriftgröße (Metadaten)", name: "metadata_font_size", widget: "string", default: "14px", hint: "Schriftgröße für Jahr, Material, Maße auf Werk-Detailseiten. z.B. 14px oder 0.9rem." }

  # TRANSLATION TABLE (Backend)
  - name: "translations"
    label: "Übersetzungen (Tabelle)"
    files:
      - label: "Text-Tabelle"
        name: "table"
        file: "src/content/ui/table.json"
        fields:
          - label: "Einträge"
            name: "translations"
            widget: "list"
            summary: "{{fields.key}}: {{fields.de}}"
            fields:
              - { label: "Variable (NICHT ÄNDERN)", name: "key", widget: "string", hint: "Technischer Schlüssel für die Programmierung" }
              - { label: "Ort (Dokumentation)", name: "location", widget: "string", hint: "Wo diese Variable auf der Website erscheint" }
              - { label: "Deutsch", name: "de", widget: "markdown" }
              - { label: "English", name: "en", widget: "markdown" }


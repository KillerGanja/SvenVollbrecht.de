backend:
  name: github
  repo: KillerGanja/SvenVollbrecht.de
  branch: Page_Switch_de-en
  base_url: https://ideenfetzen.de
  auth_endpoint: oauth/auth.php

media_folder: "public/uploads"
public_folder: "/uploads"


collections:
  # TRANSLATION TABLE (Backend)
  - name: "translations"
    label: "Übersetzungen (Tabelle)"
    files:
      - label: "Text-Tabelle"
        name: "table"
        file: "src/content/ui/table.json"
        fields:
          - label: "Einträge"
            name: "translations"
            widget: "list"
            summary: "{{fields.key}}: {{fields.de}}"
            fields:
              - { label: "Variable (NICHT ÄNDERN)", name: "key", widget: "string", hint: "Technischer Schlüssel für die Programmierung" }
              - { label: "Ort (Dokumentation)", name: "location", widget: "string", hint: "Wo diese Variable auf der Website erscheint" }
              - { label: "Deutsch", name: "de", widget: "markdown" }
              - { label: "English", name: "en", widget: "markdown" }

  # WORKS
  - name: "works"
    label: "Arbeiten"
    folder: "content/works/de"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titel (Variablen-Key)", name: "translation_key_title", widget: "string", hint: "z.B. work_albtraum_title" }
      - { label: "Text (Variablen-Key)", name: "translation_key_body", widget: "string", hint: "z.B. work_albtraum_body" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Reihenfolge", name: "order", widget: "number", required: false, default: 9999 }
      - { label: "Jahr", name: "year", widget: "number", required: false }
      - { label: "Cover Bild", name: "cover_image", widget: "image", required: true }
      - label: "Galerie Bilder"
        name: "gallery_images"
        widget: "list"
        required: false
        summary: "{{fields.image}}"
        field: { label: "Bild / Video", name: "image", widget: "file" }

  # EXHIBITIONS
  - name: "exhibitions"
    label: "Ausstellungen"
    folder: "content/exhibitions/de"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titel (Variablen-Key)", name: "translation_key_title", widget: "string" }
      - { label: "Text (Variablen-Key)", name: "translation_key_body", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Reihenfolge", name: "order", widget: "number", required: false, default: 9999 }
      - { label: "Jahr", name: "year", widget: "number", required: false }
      - { label: "Stadt", name: "city", widget: "string", required: false }
      - { label: "Zeitraum", name: "period", widget: "string", required: false }
      - { label: "Cover Bild", name: "cover_image", widget: "image", required: true }

  # STATIC PAGES
  - name: "pages"
    label: "Seiten"
    files:
      - label: "About"
        name: "about"
        file: "content/pages/about.de.md"
        fields:
          - { label: "Variablen-Key", name: "translation_key_body", widget: "string", default: "page_about_body" }
          - { label: "Titel", name: "title", widget: "string", default: "about" }
          - { label: "Slug", name: "slug", widget: "string", default: "about" }
      - label: "Contact"
        name: "contact"
        file: "content/pages/contact.de.md"
        fields:
          - { label: "Variablen-Key", name: "translation_key_body", widget: "string", default: "page_contact_body" }
          - { label: "Titel", name: "title", widget: "string", default: "contact" }
          - { label: "Slug", name: "slug", widget: "string", default: "contact" }


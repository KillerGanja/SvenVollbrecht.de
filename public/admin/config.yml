backend:
  name: github
  repo: KillerGanja/SvenVollbrecht.de
  branch: Page_Switch_de-en
  base_url: https://ideenfetzen.de
  auth_endpoint: oauth/auth.php

media_folder: "public/uploads"
public_folder: "/uploads"


collections:
  # TRANSLATION TABLE (Backend)
  - name: "translations"
    label: "Übersetzungen (Tabelle)"
    files:
      - label: "Text-Tabelle"
        name: "table"
        file: "src/content/ui/table.json"
        fields:
          - label: "Einträge"
            name: "translations"
            widget: "list"
            summary: "{{fields.key}}: {{fields.de}}"
            fields:
              - { label: "Variable (NICHT ÄNDERN)", name: "key", widget: "string", hint: "Technischer Schlüssel für die Programmierung" }
              - { label: "Ort (Dokumentation)", name: "location", widget: "string", hint: "Wo diese Variable auf der Website erscheint" }
              - { label: "Deutsch", name: "de", widget: "markdown" }
              - { label: "English", name: "en", widget: "markdown" }

  # ARBEITEN (Works)
  - name: "works"
    label: "Arbeiten"
    folder: "content/works"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Reihenfolge", name: "order", widget: "number", required: false, default: 9999 }
      - { label: "Jahr", name: "year", widget: "number", required: false }
      - { label: "Serie", name: "series", widget: "string", required: false }
      - { label: "Material (DE)", name: "materials_de", widget: "string" }
      - { label: "Material (EN)", name: "materials_en", widget: "string", required: false }
      - { label: "Maße (DE)", name: "dimensions_de", widget: "string" }
      - { label: "Maße (EN)", name: "dimensions_en", widget: "string", required: false }
      - { label: "Beschreibung (DE)", name: "description_de", widget: "markdown" }
      - { label: "Beschreibung (EN)", name: "description_en", widget: "markdown", required: false }
      - { label: "Cover Bild", name: "cover_image", widget: "image", required: true }
      - label: "Galerie Bilder"
        name: "gallery_images"
        widget: "list"
        required: false
        summary: "{{fields.image}}"
        field: { label: "Bild / Video", name: "image", widget: "file" }

  # AUSSTELLUNGEN (Exhibitions)
  - name: "exhibitions"
    label: "Ausstellungen"
    folder: "content/exhibitions"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Reihenfolge", name: "order", widget: "number", required: false, default: 9999 }
      - { label: "Jahr", name: "year", widget: "number", required: false }
      - { label: "Veranstaltungsort (DE)", name: "venue_de", widget: "string" }
      - { label: "Veranstaltungsort (EN)", name: "venue_en", widget: "string", required: false }
      - { label: "Stadt (DE)", name: "city_de", widget: "string", required: false }
      - { label: "Stadt (EN)", name: "city_en", widget: "string", required: false }
      - { label: "Zeitraum (DE)", name: "period_de", widget: "string", required: false }
      - { label: "Zeitraum (EN)", name: "period_en", widget: "string", required: false }
      - { label: "Beschreibung (DE)", name: "description_de", widget: "markdown", required: false }
      - { label: "Beschreibung (EN)", name: "description_en", widget: "markdown", required: false }
      - { label: "Cover Bild", name: "cover_image", widget: "image", required: true }

  # SEITEN (Static Pages)
  - name: "pages"
    label: "Seiten"
    files:
      - label: "Über mich"
        name: "about"
        file: "content/pages/about.md"
        fields:
          - { label: "Titel", name: "title", widget: "string", default: "Über mich" }
          - { label: "Inhalt (DE)", name: "body_de", widget: "markdown" }
          - { label: "Inhalt (EN)", name: "body_en", widget: "markdown", required: false }
          - { label: "Slug", name: "slug", widget: "hidden", default: "about" }
      - label: "Kontakt"
        name: "contact"
        file: "content/pages/contact.md"
        fields:
          - { label: "Titel", name: "title", widget: "string", default: "Kontakt" }
          - { label: "Inhalt (DE)", name: "body_de", widget: "markdown" }
          - { label: "Inhalt (EN)", name: "body_en", widget: "markdown", required: false }
          - { label: "Slug", name: "slug", widget: "hidden", default: "contact" }
      - label: "Impressum"
        name: "impressum"
        file: "content/pages/impressum.md"
        fields:
          - { label: "Titel", name: "title", widget: "string", default: "Impressum" }
          - { label: "Inhalt (DE)", name: "body_de", widget: "markdown" }
          - { label: "Inhalt (EN)", name: "body_en", widget: "markdown", required: false }
          - { label: "Slug", name: "slug", widget: "hidden", default: "impressum" }
      - label: "Datenschutz"
        name: "privacy"
        file: "content/pages/privacy.md"
        fields:
          - { label: "Titel", name: "title", widget: "string", default: "Datenschutz" }
          - { label: "Inhalt (DE)", name: "body_de", widget: "markdown" }
          - { label: "Inhalt (EN)", name: "body_en", widget: "markdown", required: false }
          - { label: "Slug", name: "slug", widget: "hidden", default: "privacy" }

